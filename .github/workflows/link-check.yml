name: Weekly External Link Check

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC (한국 월 09:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - id: linkcheck
        run: |
          set +e
          npm run check:links | tee link-report.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      - name: Open issue when links break
        if: steps.linkcheck.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('link-report.txt', 'utf-8');
            const title = `[자동] 외부 링크 점검 실패 (${new Date().toISOString().slice(0,10)})`;
            const body = [
              '주간 외부 링크 점검에서 깨진/접근 불가 링크를 발견했습니다.',
              '',
              '```',
              report.trim(),
              '```',
              '',
              '`content/events/*.md`의 sourceUrl/registrationUrl을 확인하고 수정해주세요.',
            ].join('\n');
            // 동일 제목의 열린 이슈가 있으면 코멘트만 추가
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'link-check',
            });
            const existing = issues.find(i => i.title.startsWith('[자동] 외부 링크 점검 실패'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['link-check'],
              });
            }
